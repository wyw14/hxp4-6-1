<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 外星植物杂交实验室</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>🌌 外星植物杂交实验室</h1>
      <p class="subtitle">基于孟德尔遗传定律 · 培育终极外星物种</p>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="greenhouse">🏠 温室</button>
      <button class="tab-btn" data-tab="genetics">🧬 基因图谱</button>
      <button class="tab-btn" data-tab="collection">📚 物种图鉴</button>
    </nav>

    <main class="main-content">
      <section id="greenhouse" class="tab-content active">
        <div class="control-panel">
          <div class="uv-control">
            <label for="uv-slider">紫外线辐射强度</label>
            <div class="uv-slider-container">
              <input type="range" id="uv-slider" min="0" max="100" value="0">
              <span id="uv-value">0%</span>
            </div>
            <p class="uv-hint">⚠️ 提高紫外线会增加突变概率，但也可能产生不可预测的结果</p>
          </div>
          
          <div class="parent-selector">
            <div class="parent-slot" id="parent1-slot">
              <div class="slot-label">亲本 1</div>
              <div class="slot-content" id="parent1-content">
                <span class="empty-hint">点击植物选择</span>
              </div>
            </div>
            <div class="cross-icon">×</div>
            <div class="parent-slot" id="parent2-slot">
              <div class="slot-label">亲本 2</div>
              <div class="slot-content" id="parent2-content">
                <span class="empty-hint">点击植物选择</span>
              </div>
            </div>
            <button id="crossbreed-btn" class="action-btn" disabled>🌸 开始杂交</button>
            <button id="generate-btn" class="secondary-btn">🌱 培育新种子</button>
          </div>
        </div>

        <div class="greenhouse">
          <h2 class="section-title">🌿 温室植物</h2>
          <div id="plants-grid" class="plants-grid"></div>
        </div>
      </section>

      <section id="genetics" class="tab-content">
        <h2 class="section-title">🧬 基因图谱</h2>
        <div class="genetics-info">
          <div class="gene-legend">
            <h3>基因说明</h3>
            <div class="gene-item">
              <span class="gene-symbol">A</span>
              <span class="gene-name">发光颜色</span>
              <span class="gene-trait dominant">显性: 青色</span>
              <span class="gene-trait recessive">隐性: 品红</span>
            </div>
            <div class="gene-item">
              <span class="gene-symbol">B</span>
              <span class="gene-name">叶片形状</span>
              <span class="gene-trait dominant">显性: 晶体状</span>
              <span class="gene-trait recessive">隐性: 触手状</span>
            </div>
            <div class="gene-item">
              <span class="gene-symbol">C</span>
              <span class="gene-name">植株大小</span>
              <span class="gene-trait dominant">显性: 巨型</span>
              <span class="gene-trait recessive">隐性: 微型</span>
            </div>
            <div class="gene-item">
              <span class="gene-symbol">D</span>
              <span class="gene-name">发光强度</span>
              <span class="gene-trait dominant">显性: 明亮</span>
              <span class="gene-trait recessive">隐性: 暗淡</span>
            </div>
            <div class="gene-item">
              <span class="gene-symbol">E</span>
              <span class="gene-name">特殊能力</span>
              <span class="gene-trait dominant">显性: 漂浮</span>
              <span class="gene-trait recessive">隐性: 无</span>
            </div>
          </div>
          
          <div id="genetics-detail" class="genetics-detail">
            <p class="hint">选择一株植物查看其基因详情</p>
          </div>
        </div>
      </section>

      <section id="collection" class="tab-content">
        <h2 class="section-title">📚 物种图鉴</h2>
        <div id="collection-grid" class="collection-grid"></div>
      </section>
    </main>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="modal-body"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.ts"></script>
</body>
</html>
